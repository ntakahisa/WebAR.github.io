<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>等速円運動シミュレータ（横から観察可能版）</title>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <script>
    // 一度マーカーを認識したら、その位置に世界座標でオブジェクトを固定するコンポーネント
    AFRAME.registerComponent('world-lock', {
      init: function () {
        this.marker = document.querySelector('a-marker');
        this.container = document.querySelector('#locked-container');
        this.hasLocked = false;
        
        // 毎フレームの監視
        this.el.sceneEl.addEventListener('tick', () => {
          // マーカーが認識されており、まだ座標をロックしていない場合
          if (this.marker.object3D.visible && !this.hasLocked) {
            // マーカーの現在の世界座標と回転を取得
            const worldPosition = new THREE.Vector3();
            const worldQuaternion = new THREE.Quaternion();
            const worldScale = new THREE.Vector3();
            
            this.marker.object3D.matrixWorld.decompose(worldPosition, worldQuaternion, worldScale);
            
            // ロック用コンテナ（シーン直下）に座標をコピー
            this.container.object3D.position.copy(worldPosition);
            this.container.object3D.quaternion.copy(worldQuaternion);
            
            // オブジェクトを可視化
            this.container.setAttribute('visible', 'true');
            this.hasLocked = true;
            
            // 画面上にロック完了を通知（デバッグ用）
            document.querySelector('#status').innerText = "位置をロックしました。マーカーから離れて横から観察できます！";
            document.querySelector('#status').style.backgroundColor = "rgba(40, 167, 69, 0.8)";
          }
        });
      }
    });

    // 等速円運動と正弦波の動きを制御するアニメーション
    AFRAME.registerComponent('circular-motion', {
      schema: {
        radius: {type: 'number', default: 1.5}, // 円運動の半径
        speed: {type: 'number', default: 0.002} // 回転速度
      },
      init: function () {
        this.angle = 0;
      },
      tick: function (time, timeDelta) {
        this.angle += this.data.speed * timeDelta;
        
        // 円運動するボール（赤）の座標計算
        const x = this.data.radius * Math.cos(this.angle);
        const z = this.data.radius * Math.sin(this.angle);
        this.el.setAttribute('position', {x: x, y: 0.5, z: z}); // Y軸は床から50cm浮かせる
        
        // 横（X軸）の往復運動（単振動）を示す影や補助ライン用（青）
        const shadowBall = document.querySelector('#shadow-ball');
        if (shadowBall) {
          shadowBall.setAttribute('position', {x: x, y: 0.1, z: 0});
        }
      }
    });
  </script>
  <style>
    #status {
      position: absolute;
      top: 10px;
      left: 10px;
      padding: 10px;
      background: rgba(220, 53, 69, 0.8);
      color: white;
      font-family: sans-serif;
      font-size: 14px;
      border-radius: 5px;
      z-index: 999;
      pointer-events: none;
    }
    button {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 24px;
      font-size: 16px;
      background-color: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      z-index: 999;
      cursor: pointer;
    }
  </style>
</head>

<body style="margin: 0; overflow: hidden;">
  <div id="status">マーカー（Hiro）をカメラに映して位置を固定してください</div>
  
  <button onclick="location.reload();">位置をリセット</button>

  <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" world-lock>
    
    <a-marker preset="hiro"></a-marker>

    <a-entity id="locked-container" visible="false">
      
      <a-grid limits="5" cell-size="0.5" color="#ccc" opacity="0.5"></a-grid>

      <a-ring color="#555" radius-inner="1.48" radius-outer="1.52" rotation="-90 0 0" position="0 0.5 0" opacity="0.6"></a-ring>

      <a-sphere id="main-ball" circular-motion="radius: 1.5; speed: 0.002" radius="0.15" color="#FF4136"></a-sphere>

      <a-sphere id="shadow-ball" radius="0.1" color="#0074D9" opacity="0.8"></a-sphere>

      <a-cylinder position="0 0.5 0" radius="0.01" height="3" rotation="0 0 90" color="#aaaaaa" opacity="0.4"></a-cylinder>

    </a-entity>

    <a-entity camera></a-entity>
  </scene>
</body>
</html>
