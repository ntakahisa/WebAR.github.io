<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>等速円運動と単振動 3D仮想空間教材</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
        }

        #container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* 3D仮想空間の描画エリア */
        #canvas3d {
            width: 100%;
            flex: 1;
            display: block;
        }

        /* ガイド・解説表示 */
        #guide-overlay {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            background: rgba(30, 41, 59, 0.85);
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            line-height: 1.4;
            pointer-events: none;
            border-left: 4px solid #3b82f6;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* 右側：物理数値データ */
        #data-panel {
            position: absolute;
            top: 120px;
            right: 15px;
            background: rgba(15, 23, 42, 0.85);
            padding: 10px;
            border-radius: 8px;
            font-size: 11px;
            font-family: monospace;
            border: 1px solid rgba(255,255,255,0.1);
            pointer-events: none;
        }
        .text-orange { color: #f97316; font-weight: bold; }
        .text-cyan { color: #06b6d4; font-weight: bold; }
        .text-red { color: #ef4444; font-weight: bold; }

        /* 左側：ベクトルON/OFFスイッチ */
        #vector-controls {
            position: absolute;
            top: 120px;
            left: 15px;
            background: rgba(15, 23, 42, 0.85);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .ctrl-label {
            display: flex;
            align-items: center;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
        }
        .ctrl-label input {
            margin-right: 6px;
        }

        /* 下部：操作パネル */
        #control-panel {
            background: #1e293b;
            border-top: 1px solid #334155;
            padding: 15px;
            box-sizing: border-box;
            z-index: 10;
        }

        .panel-row {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 600px;
            margin: 0 auto;
        }

        .slider-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .slider-meta {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-weight: bold;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: #475569;
            border-radius: 3px;
            outline: none;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #2563eb;
            color: white;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .action-btn:active {
            background: #1d4ed8;
        }

        /* リアルタイムグラフエリア */
        #graph-container {
            border-top: 1px solid #334155;
            height: 70px;
            background: #0f172a;
            position: relative;
        }
        #graphCanvas {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="guide-overlay">
            👉 <b>3D空間操作:</b> 画面をドラッグして回転、ピンチ（2本指）で拡大縮小。<br>
            <span style="color:#60a5fa;">画面を真横にドラッグして傾けると、等速円運動がただの往復運動（単振動）に見える瞬間が観察できます。</span>
        </div>

        <div id="vector-controls">
            <label class="ctrl-label"><input type="checkbox" id="chk-r" checked> 半径r (橙)</label>
            <label class="ctrl-label"><input type="checkbox" id="chk-v" checked> 速度v (青)</label>
            <label class="ctrl-label"><input type="checkbox" id="chk-a" checked> 加速度a (赤)</label>
        </div>

        <div id="data-panel">
            <div>半径 r: <span id="val-r" class="text-orange">1.20</span> m</div>
            <div>角速度 ω: <span id="val-omega" class="text-orange">2.00</span> rad/s</div>
            <div>速度 v: <span id="val-v" class="text-cyan">2.40</span> m/s</div>
            <div>加速度 a: <span id="val-ac" class="text-red">4.80</span> m/s²</div>
            <div>周期 T: <span id="val-t">3.14</span> s</div>
        </div>

        <canvas id="canvas3d"></canvas>

        <div id="graph-container">
            <canvas id="graphCanvas"></canvas>
        </div>

        <div id="control-panel">
            <div class="panel-row">
                <div class="slider-group">
                    <div class="slider-meta"><span>半径 r (m)</span><span id="lbl-r" class="text-orange">1.20</span></div>
                    <input type="range" id="sld-r" min="0.5" max="2.0" step="0.05" value="1.20">
                </div>
                <div class="slider-group">
                    <div class="slider-meta"><span>角速度 ω (rad/s)</span><span id="lbl-omega" class="text-orange">2.00</span></div>
                    <input type="range" id="sld-omega" min="0.5" max="4.0" step="0.05" value="2.00">
                </div>
                <div class="btn-group">
                    <button id="btn-play" class="action-btn">一時停止</button>
                    <button id="btn-reset" class="action-btn" style="background:#475569;">位置リセット</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. 物理パラメータの設定 ---
        let r = 1.20;
        let omega = 2.00;
        let theta = 0;
        let isPlaying = true;
        
        let showR = true, showV = true, showA = true;
        const xHistory = [];
        const maxHistoryLen = 200;

        // --- 2. Three.js による3D仮想空間の構築 ---
        const canvas3D = document.getElementById('canvas3d');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f172a);

        // カメラ（少し斜め上から見下ろす初期視点）
        const camera = new THREE.PerspectiveCamera(45, canvas3D.clientWidth / canvas3D.clientHeight, 0.1, 100);
        camera.position.set(0, 3.5, 6);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ canvas: canvas3D, antialias: true });
        renderer.setSize(canvas3D.clientWidth, canvas3D.clientHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        // 照明
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(5, 10, 7);
        scene.add(dirLight);

        // 3D空間の基準グリッド（床面）
        const gridHelper = new THREE.GridHelper(8, 16, 0x475569, 0x334155);
        gridHelper.position.y = -1.0;
        scene.add(gridHelper);

        // --- 3. 3Dモデル要素の作成 ---
        
        // 中心軸
        const centerPinGeo = new THREE.CylinderGeometry(0.02, 0.02, 1.0, 8);
        const centerPinMat = new THREE.MeshStandardMaterial({ color: 0x64748b });
        const centerPin = new THREE.Mesh(centerPinGeo, centerPinMat);
        centerPin.position.y = -0.5;
        scene.add(centerPin);

        // 円運動の回転軌道（リング）
        let orbitGeo = new THREE.RingGeometry(r - 0.015, r + 0.015, 64);
        const orbitMat = new THREE.MeshBasicMaterial({ color: 0xffffff, side: THREE.DoubleSide, opacity: 0.4, transparent: true });
        let orbit = new THREE.Mesh(orbitGeo, orbitMat);
        orbit.rotation.x = Math.PI / 2; // 水平にする
        scene.add(orbit);

        // 円運動する主球（赤色）
        const ballGeo = new THREE.SphereGeometry(0.12, 32, 32);
        const ballMat = new THREE.MeshStandardMaterial({ color: 0xef4444, roughness: 0.2 });
        const ball = new THREE.Mesh(ballGeo, ballMat);
        scene.add(ball);

        // 単振動する射影球（青色）
        const shadowBallGeo = new THREE.SphereGeometry(0.09, 32, 32);
        const shadowBallMat = new THREE.MeshStandardMaterial({ color: 0x3b82f6 });
        const shadowBall = new THREE.Mesh(shadowBallGeo, shadowBallMat);
        shadowBall.position.y = -1.0; // 床面の上をスライドさせる
        scene.add(shadowBall);

        // 往復運動（単振動）のガイドレール
        const railGeo = new THREE.CylinderGeometry(0.01, 0.01, 5, 8);
        const railMat = new THREE.MeshStandardMaterial({ color: 0x475569 });
        const rail = new THREE.Mesh(railGeo, railMat);
        rail.rotation.z = Math.PI / 2;
        rail.position.set(0, -1.0, 0);
        scene.add(rail);

        // --- 4. ベクトル矢印の定義 ---
        
        // 半径ベクトル (橙)
        const arrowRGeo = new THREE.CylinderGeometry(0.015, 0.015, 1.0, 8);
        const arrowRMat = new THREE.MeshBasicMaterial({ color: 0xf97316 });
        const arrowR = new THREE.Mesh(arrowRGeo, arrowRMat);
        arrowR.rotation.z = Math.PI / 2;
        scene.add(arrowR);

        // 速度ベクトル (青緑・コーン)
        const arrowVGroup = new THREE.Group();
        const arrowVLine = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, 0.6, 8), new THREE.MeshBasicMaterial({ color: 0x06b6d4 }));
        const arrowVCone = new THREE.Mesh(new THREE.ConeGeometry(0.04, 0.15, 16), new THREE.MeshBasicMaterial({ color: 0x06b6d4 }));
        arrowVLine.position.y = 0.3;
        arrowVCone.position.y = 0.6;
        arrowVGroup.add(arrowVLine);
        arrowVGroup.add(arrowVCone);
        scene.add(arrowVGroup);

        // 加速度ベクトル (赤・コーン)
        const arrowAGroup = new THREE.Group();
        const arrowALine = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.01, 0.6, 8), new THREE.MeshBasicMaterial({ color: 0xec4899 }));
        const arrowACone = new THREE.Mesh(new THREE.ConeGeometry(0.04, 0.15, 16), new THREE.MeshBasicMaterial({ color: 0xec4899 }));
        arrowALine.position.y = -0.3;
        arrowACone.position.y = -0.6;
        arrowAGroup.add(arrowALine);
        arrowAGroup.add(arrowACone);
        scene.add(arrowAGroup);


        // --- 5. ドラッグ操作による3D空間回転（スマホ対応） ---
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        // 回転角を制限・記録する変数
        let cameraAngleX = 0; // 左右回転
        let cameraAngleY = 0.5; // 上下見下ろし角度

        function handleStart(clientX, clientY) {
            isDragging = true;
            previousMousePosition = { x: clientX, y: clientY };
        }

        function handleMove(clientX, clientY) {
            if (!isDragging) return;
            const deltaX = clientX - previousMousePosition.x;
            const deltaY = clientY - previousMousePosition.y;

            cameraAngleX -= deltaX * 0.007;
            cameraAngleY = Math.max(0.01, Math.min(Math.PI / 2 - 0.01, cameraAngleY + deltaY * 0.007)); // 地面の下には潜り込まない

            updateCameraPosition();
            previousMousePosition = { x: clientX, y: clientY };
        }

        function updateCameraPosition() {
            const distance = 6.5; // カメラからの距離を固定
            camera.position.x = distance * Math.sin(cameraAngleX) * Math.cos(cameraAngleY);
            camera.position.z = distance * Math.cos(cameraAngleX) * Math.cos(cameraAngleY);
            camera.position.y = distance * Math.sin(cameraAngleY);
            camera.lookAt(0, 0, 0);
        }

        // マウスイベント
        canvas3D.addEventListener('mousedown', (e) => handleStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', () => isDragging = false);

        // タッチイベント (スマホ用)
        canvas3D.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) handleStart(e.touches[0].clientX, e.touches[0].clientY);
        });
        window.addEventListener('touchmove', (e) => {
            if (e.touches.length === 1) handleMove(e.touches[0].clientX, e.touches[0].clientY);
        });
        window.addEventListener('touchend', () => isDragging = false);


        // --- 6. リアルタイム・グラフの描画 ---
        const graphCanvas = document.getElementById('graphCanvas');
        const gCtx = graphCanvas.getContext('2d');
        
        function resizeGraphCanvas() {
            graphCanvas.width = graphCanvas.parentElement.clientWidth;
            graphCanvas.height = graphCanvas.parentElement.clientHeight;
        }
        window.addEventListener('resize', resizeGraphCanvas);
        resizeGraphCanvas();

        function drawGraph() {
            gCtx.clearRect(0, 0, graphCanvas.width, graphCanvas.height);

            // 中心線（基準線）
            gCtx.strokeStyle = '#334155';
            gCtx.lineWidth = 1;
            gCtx.beginPath();
            gCtx.moveTo(0, graphCanvas.height / 2);
            gCtx.lineTo(graphCanvas.width, graphCanvas.height / 2);
            gCtx.stroke();

            // 正弦波プロット
            if (xHistory.length === 0) return;
            gCtx.strokeStyle = '#3b82f6';
            gCtx.lineWidth = 2.5;
            gCtx.beginPath();
            
            const step = graphCanvas.width / maxHistoryLen;
            for (let i = 0; i < xHistory.length; i++) {
                const val = xHistory[i];
                // 半径最大2.0に対応するスケーリング
                const canvasY = (graphCanvas.height / 2) - (val * (graphCanvas.height / 5));
                const canvasX = graphCanvas.width - (i * step);
                
                if (i === 0) gCtx.moveTo(canvasX, canvasY);
                else gCtx.lineTo(canvasX, canvasY);
            }
            gCtx.stroke();
        }


        // --- 7. 物理計算の同期・更新ロジック ---
        
        function updatePhysicsValues() {
            const vVal = r * omega;
            const acVal = r * omega * omega;
            const tVal = (2 * Math.PI) / omega;

            // UI数値テキスト更新
            document.getElementById('val-r').textContent = r.toFixed(2);
            document.getElementById('val-omega').textContent = omega.toFixed(2);
            document.getElementById('val-v').textContent = vVal.toFixed(2);
            document.getElementById('val-ac').textContent = acVal.toFixed(2);
            document.getElementById('val-t').textContent = tVal.toFixed(2);

            document.getElementById('lbl-r').textContent = r.toFixed(2);
            document.getElementById('lbl-omega').textContent = omega.toFixed(2);

            // 軌道リングの再生成
            scene.remove(orbit);
            orbitGeo = new THREE.RingGeometry(r - 0.015, r + 0.015, 64);
            orbit = new THREE.Mesh(orbitGeo, orbitMat);
            orbit.rotation.x = Math.PI / 2;
            scene.add(orbit);
        }

        // --- 8. メインアニメーションループ ---
        let clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const dt = clock.getDelta();

            if (isPlaying) {
                theta += omega * dt;

                // 1. 円運動の位置決定
                const ballX = r * Math.cos(theta);
                const ballZ = -r * Math.sin(theta);
                ball.position.set(ballX, 0, ballZ);

                // 2. 単振動（射影）の位置決定
                shadowBall.position.x = ballX;

                // 3. 半径ベクトルの更新
                arrowR.position.set(ballX / 2, 0, ballZ / 2);
                arrowR.scale.set(1, r, 1);
                arrowR.rotation.z = Math.atan2(ballZ, ballX) + Math.PI / 2;

                // 4. 速度ベクトルの更新（接線方向）
                const vx = -omega * r * Math.sin(theta);
                const vz = -omega * r * Math.cos(theta);
                arrowVGroup.position.set(ballX, 0, ballZ);
                arrowVGroup.rotation.y = theta;
                // ベクトルの大きさを速度vに比例させる
                const vMag = r * omega * 0.35;
                arrowVGroup.scale.set(1, vMag, 1);

                // 5. 向心加速度ベクトルの更新（中心向き）
                arrowAGroup.position.set(ballX, 0, ballZ);
                arrowAGroup.rotation.y = theta;
                // ベクトルの大きさを加速度aに比例させる
                const aMag = r * omega * omega * 0.15;
                arrowAGroup.scale.set(1, aMag, 1);

                // ベクトル表示ON/OFF反映
                arrowR.visible = showR;
                arrowVGroup.visible = showV;
                arrowAGroup.visible = showA;

                // 履歴に追加してグラフをアップデート
                xHistory.unshift(ballX);
                if (xHistory.length > maxHistoryLen) xHistory.pop();
            }

            drawGraph();
            renderer.render(scene, camera);
        }


        // --- 9. UIイベントの紐付け ---
        
        const sldR = document.getElementById('sld-r');
        const sldOmega = document.getElementById('sld-omega');
        const btnPlay = document.getElementById('btn-play');
        const btnReset = document.getElementById('btn-reset');

        sldR.addEventListener('input', (e) => {
            r = parseFloat(e.target.value);
            updatePhysicsValues();
        });

        sldOmega.addEventListener('input', (e) => {
            omega = parseFloat(e.target.value);
            updatePhysicsValues();
        });

        btnPlay.addEventListener('click', () => {
            isPlaying = !isPlaying;
            btnPlay.textContent = isPlaying ? "一時停止" : "再 生";
        });

        btnReset.addEventListener('click', () => {
            theta = 0;
            xHistory.length = 0;
            cameraAngleX = 0;
            cameraAngleY = 0.5;
            updateCameraPosition();
            updatePhysicsValues();
        });

        // ベクトルチェックボックス
        document.getElementById('chk-r').addEventListener('change', (e) => showR = e.target.checked);
        document.getElementById('chk-v').addEventListener('change', (e) => showV = e.target.checked);
        document.getElementById('chk-a').addEventListener('change', (e) => showA = e.target.checked);

        // ウィンドウリサイズ対応
        window.addEventListener('resize', () => {
            camera.aspect = canvas3D.clientWidth / canvas3D.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(canvas3D.clientWidth, canvas3D.clientHeight);
        });

        // 初期セットアップ実行
        updateCameraPosition();
        updatePhysicsValues();
        animate();
    </script>
</body>
</html>
