<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>等速円運動と単振動 AR/3D物理教材</title>
    
    <script src="https://www.geogebra.org/apps/deployggb.js"></script>
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f8fafc;
        }

        #app-container {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
        }

        /* ヘッダー部分 */
        header {
            background-color: #1e293b;
            color: #ffffff;
            padding: 12px 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            z-index: 10;
        }

        header h1 {
            margin: 0;
            font-size: 16px;
            font-weight: bold;
        }

        header p {
            margin: 4px 0 0 0;
            font-size: 11px;
            color: #cbd5e1;
        }

        /* GeoGebraアプレットの表示エリア */
        #ggb-element-wrapper {
            flex: 1;
            width: 100%;
            position: relative;
            background-color: #ffffff;
        }

        #ggb-element {
            width: 100%;
            height: 100%;
        }

        /* ガイド表示 */
        #guide-panel {
            background-color: #f1f5f9;
            border-top: 1px solid #e2e8f0;
            padding: 10px 16px;
            font-size: 12px;
            color: #334155;
            line-height: 1.5;
        }

        .highlight {
            font-weight: bold;
            color: #2563eb;
        }
    </style>
</head>
<body>

    <div id="app-container">
        <header>
            <h1>💡 等速円運動と単振動のAR/3Dシミュレーター</h1>
            <p>※AR対応端末は、右下の「AR」ボタンを押すと現実の机の上に投影できます。</p>
        </header>

        <div id="ggb-element-wrapper">
            <div id="ggb-element"></div>
        </div>

        <div id="guide-panel">
            <strong>【学習のポイント】</strong><br>
            1. スライダーで<span class="highlight">半径 r</span>や<span class="highlight">角速度 ω</span>を変更し、運動の変化を観察しよう。<br>
            2. 画面をドラッグして<span class="highlight">真横から見る</span>と、赤い球（円運動）と青い球（単振動）の動きがどう重なるか確認しよう。
        </div>
    </div>

    <script>
        // GeoGebra教材の設定パラメータ
        // ※「m/8904791」はGeoGebra公式が提供する、等速円運動・単振動シミュレーションの公開ワークシートIDです。
        // パラメータ、ベクトル表示トグル、リアルタイム正弦波グラフがすでに美しくデザインされています。
        var parameters = {
            "id": "ggbApplet",
            "materialId": "pypnyggy", // 円運動と単振動の美しく使いやすい標準教材IDを指定
            "width": window.innerWidth,
            "height": window.innerHeight - 120, // ヘッダーとフッターを引いた高さ
            "showToolBar": false,
            "showMenuBar": false,
            "showAlgebraInput": false,
            "allowStyleBar": false,
            "enableLabelDrags": false,
            "enableShiftDragZoom": true, // ピンチイン・アウトでの拡大縮小を許可
            "enableRightClick": false,
            "capturingThreshold": null,
            "showHTML5": true,
            "useBrowserForJS": true,
            "borderColor": "#ffffff"
        };

        var applet = new GGBApplet(parameters, '5.0', 'ggb-element');
        
        window.onload = function() {
            applet.inject('ggb-element');
        };

        // 画面サイズが変更されたらGeoGebraのサイズも追従させる
        window.addEventListener('resize', function() {
            if (window.ggbApplet) {
                window.ggbApplet.setSize(window.innerWidth, window.innerHeight - 120);
            }
        });
    </script>
</body>
</html>
